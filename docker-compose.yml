services:
  # ============================================
  # Data Lake - MinIO (S3-compatible storage)
  # ============================================
  minio:
    image: quay.io/minio/minio
    container_name: minio-de
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server --console-address ":9001" /data
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - lakehouse

  # MinIO bucket initialization (one-shot)
  minio-init:
    image: quay.io/minio/mc
    container_name: minio-init-de
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
      - ./data:/data:ro
    entrypoint: /bin/bash
    command: /init.sh
    restart: "no"
    networks:
      - lakehouse

  # ============================================
  # Processing - Apache Spark
  # ============================================
  spark-master:
    build: ./docker/spark
    container_name: spark-master-de
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"    # Cluster manager
      - "8081:8080"    # Spark Master UI (remapped to avoid conflict with Airflow)
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark-jobs:/opt/spark/jobs:ro
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - lakehouse

  spark-worker:
    build: ./docker/spark
    container_name: spark-worker-de
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 1g
    volumes:
      - ./docker/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark-jobs:/opt/spark/jobs:ro
    depends_on:
      - spark-master
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - lakehouse

  # ============================================
  # Metadata - PostgreSQL (Airflow backend)
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres-de
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - lakehouse

  # ============================================
  # Orchestration - Apache Airflow (LocalExecutor)
  # ============================================
  airflow-init:
    image: apache/airflow:2.8.3-python3.11
    container_name: airflow-init-de
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username airflow --password airflow --firstname Admin --lastname User --role Admin --email admin@localhost"
    restart: "no"
    networks:
      - lakehouse

  airflow-webserver:
    image: apache/airflow:2.8.3-python3.11
    container_name: airflow-webserver-de
    command: webserver
    ports:
      - "8080:8080"    # Airflow Web UI
    environment:
      <<: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - lakehouse

  airflow-scheduler:
    image: apache/airflow:2.8.3-python3.11
    container_name: airflow-scheduler-de
    command: scheduler
    environment:
      <<: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - lakehouse

  # ============================================
  # Catalog - Unity Catalog OSS
  # ============================================
  unity-catalog:
    image: unitycatalog/unitycatalog:latest
    container_name: unity-catalog-de
    ports:
      - "8181:8080"    # UC API (remapped to avoid conflict with Airflow)
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - lakehouse

volumes:
  minio_data:
  postgres_data:

networks:
  lakehouse:
    driver: bridge
